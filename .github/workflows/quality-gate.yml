name: Quality Gate

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Type, Security & Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black ruff mypy xenon pip-audit bandit interrogate

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: MyPy (type check)
        run: mypy src

      - name: Xenon (complexity)
        run: xenon --max-absolute B --max-modules B --max-average A src

      - name: Bandit (security static analysis)
        run: bandit -r src

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit --progress-spinner off

      - name: Interrogate (docstring coverage)
        run: interrogate -v src

      - name: Pytest
        run: pytest -q
